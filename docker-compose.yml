services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  ai-service:
    build: ./ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env.example

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/campuscopilot
      - JWT_SECRET=change-this-in-production
      - AI_SERVICE_URL=http://ai-service:8000
      - CLIENT_ORIGIN=http://localhost:5173
    depends_on:
      - mongo
      - ai-service

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-data:
